# 训练配置
training:
  output_dir: ./outputs
  num_train_epochs: 1             # 已经训练了1.6 epoch，改成1直接完成
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4  # 等效 batch_size = 16
  learning_rate: 1.0e-4           # 降低学习率，更稳定
  warmup_ratio: 0.1               # 增加 warmup 比例
  lr_scheduler_type: cosine
  logging_steps: 5                # 更频繁的日志
  save_steps: 100                 # 更频繁的保存
  save_total_limit: 3
  fp16: false
  bf16: false
  gradient_checkpointing: true
  optim: adamw_torch
  max_grad_norm: 1.0
  weight_decay: 0.1               # 增加正则化
  seed: 42
  evaluation_strategy: "no"       # 先不评估，训练完单独评测

# 数据配置
data:
  train_file: ./data/processed/train.jsonl
  validation_file: ./data/processed/valid.jsonl
  max_seq_length: 512
  preprocessing_num_workers: 4
  packing: false                    # 是否打包多个样本

# 评估配置
evaluation:
  eval_strategy: steps
  eval_steps: 100
  per_device_eval_batch_size: 4
